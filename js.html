  <body>

<div class="container mt-3">

        <div class="col-3">
            <a href="index.html">
                <img src="https://liseyazokulu.sabanciuniv.edu/themes/custom/lyo/lyo-logo.svg">

        </div>
    </div>
    <div class="row mt-4 mb-4 py-4 rounded-5 bg-secondary text-white text-center">
        <div class="col-12">
            <h1>İletişim</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <h3>Sayılar</h3>
            1. Sayı<input type="number" id="sayi1" name="sayi1" value="15">
            2. Sayı<input type="number" id="sayi2" name="sayi2" value="20">
            <h3>İşlem</h3>
            <input type="button" value="Topla" onclick="islemyap('topla')">
            <input type="button" value="Çıkar" onclick="islemyap('cikar')">
            <input type="button" value="Çarp" onclick="islemyap('carp')">
            <input type="button" value="Böl" onclick="islemyap('bol')">
            <h3>Sonuç</h3>
            <input type="text" id="sonuc" name="sonuc">
        </div>
    </div>

    <script>
        function islemyap(islem) {
            var sayi1 = parseInt(document.getElementById('sayi1').value);
            var sayi2 = parseInt(document.getElementById('sayi2').value);
            if(islem == 'topla') {
                sonuc = sayi1 + sayi2;
            }
            if(islem == 'cikar') {
                sonuc = sayi1 - sayi2;
            }
            if(islem == 'carp') {
                sonuc = sayi1 * sayi2;
            }
            if(islem == 'bol') {
                sonuc = sayi1 / sayi2;
            }
            
            document.getElementById('sonuc').value = sonuc;

        }
    </script>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>

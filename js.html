    <link href="assets/style.css" rel="stylesheet">
  </head>
  <body>

<div class="container mt-3">
    <div class="row">
        <div class="col-3">
            <a href="index.html">
                <img src="https://liseyazokulu.sabanciuniv.edu/themes/custom/lyo/lyo-logo.svg">
            </a>
        </div>
        <div class="col-9 text-end p-3 menu">
            <a href="index.html">Ana Sayfa</a>
            <a href="dersler.html">Dersler</a>
            <a href="js.html">Javascript</a>
            <a href="iletisim.html">İletişim</a>
        </div>
    </div>
    <div class="row mt-4 mb-4 py-4 rounded-5 bg-secondary text-white text-center">
        <div class="col-12">
            <h1>JavaScript Öğreniyorum</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <h3>Sayılar</h3>
            1. Sayı<input type="number" id="sayi1" name="sayi1" value="100"  class="form-control genislik-100px">
            2. Sayı<input type="number" id="sayi2" name="sayi2" value="20" class="form-control genislik-100px">
            <h3>İşlem</h3>
            <input type="button" value="Topla" onclick="islemyap('topla')" class="btn btn-primary">
            <input type="button" value="Çıkar" onclick="islemyap('cikar')" class="btn btn-primary">
            <input type="button" value="Çarp" onclick="islemyap('carp')" class="btn btn-primary">
            <input type="button" value="Böl" onclick="islemyap('bol')" class="btn btn-primary">
            <h3>Sonuç</h3>
            <div class="sonuc" id="sonuc"></div>
        </div>
    </div>

<hr>
    <div class="row">
        <div class="col-2">
            <button type="button" onclick="sayilari_yaz()" class="btn btn-secondary">1-100 arası sayıları yaz</button>
        </div>
        <div class="col-10">
            <div id="tum-sayilar"></div>
        </div>
    </div>

<hr>
    <div class="row"> 
        <div class="col-12">
            <input type="text" name="sansli-sayim" id="sansli-sayim" class="form-control genislik-100px" placeholder="Şanslı Sayını Gir" value="0"><br>
            <button type="button" onclick="sans_kontrolu()" class="btn btn-warning">Şanlsımıyım</button>
            <div class="sonuc" id="sansli-sayi"></div>
            <div class="sonuc" id="sans-sonucu"></div>
        </div>
    </div>

    <script>
        function islemyap(islem) {
            var sayi1 = parseInt(document.getElementById('sayi1').value);
            var sayi2 = parseInt(document.getElementById('sayi2').value);
            if(islem == 'topla') {
                sonuc = sayi1 + sayi2;
            }
            if(islem == 'cikar') {
                sonuc = sayi1 - sayi2;
            }
            if(islem == 'carp') {
                sonuc = sayi1 * sayi2;
            }
            if(islem == 'bol') {
                sonuc = sayi1 / sayi2;
            }
            
            document.getElementById('sonuc').innerHTML = sonuc;
        }

        function sayilari_yaz() {
            for(i = 0; i <= 100; i=i+10) {
                document.getElementById('tum-sayilar').innerHTML += i + ' - ';
            }
        } 
        var sansli_sayi = Math.floor(Math.random() * 10);

        function sans_kontrolu() {    
            var kullanicinin_sayisi = parseInt(document.getElementById('sansli-sayim').value);
            document.getElementById('sansli-sayi').innerHTML = sansli_sayi;
            console.log(sansli_sayi);
            console.log(kullanicinin_sayisi);
            if(sansli_sayi == kullanicinin_sayisi) {
                document.getElementById('sansli-sayi').innerHTML = 'Tebrikler, bugün şanlısın';
            } else {
                document.getElementById('sansli-sayi').innerHTML = 'Olmadı, bir daha dene.';
            }
        }

    </script>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
